general_settings:
  master_key: sk-1234
litellm_settings:
  cache: true
  cache_params:
    type: local
  callbacks:
  - custom_hooks.web_search_hook
  - payload_logger.payload_logger
  - routing_hook.smart_router_hook
  drop_params: true
  num_retries: 3
  retry: true
  set_verbose: true
